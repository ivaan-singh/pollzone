<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PollZone 🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFE234;
    --orange: #FF6B2B;
    --pink: #FF3D8A;
    --blue: #2BAAFF;
    --green: #1BDD7A;
    --purple: #A855F7;
    --dark: #0F0F1A;
    --card: #1A1A2E;
    --text: #F0F0FF;
    --muted: #8888AA;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(255,226,52,0.05) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255,61,138,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,15,26,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 2px solid rgba(255,226,52,0.2);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }

  .nav-logo {
    font-family: 'Boogaloo', cursive;
    font-size: 1.8rem; color: var(--yellow);
    text-decoration: none;
  }
  .nav-logo span { color: var(--pink); }

  .nav-links { display: flex; gap: 0.3rem; list-style: none; flex-wrap: wrap; }
  .nav-links a {
    color: var(--muted); text-decoration: none;
    font-size: 0.8rem; font-weight: 700;
    padding: 0.3rem 0.7rem; border-radius: 20px;
    transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .nav-links a:hover { color: var(--yellow); background: rgba(255,226,52,0.1); }

  /* POTW */
  .potw {
    position: relative; z-index: 1;
    margin: 3rem 2rem 2rem;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 2px solid var(--yellow);
    border-radius: 24px; padding: 3rem; text-align: center;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(255,226,52,0.15);
  }
  .potw::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(255,226,52,0.08) 0%, transparent 70%);
  }
  .potw-badge {
    display: inline-block;
    background: var(--yellow); color: var(--dark);
    font-family: 'Boogaloo', cursive; font-size: 0.9rem;
    letter-spacing: 2px; padding: 0.3rem 1rem;
    border-radius: 20px; margin-bottom: 1rem; text-transform: uppercase;
  }
  .potw h2 {
    font-family: 'Boogaloo', cursive;
    font-size: 2.5rem; color: var(--yellow);
    margin-bottom: 0.5rem; position: relative;
  }
  .potw p { color: var(--muted); font-size: 1rem; margin-bottom: 2rem; }

  .potw-options { display: flex; align-items: center; justify-content: center; gap: 2rem; flex-wrap: wrap; }

  .potw-btn {
    background: rgba(255,226,52,0.08);
    border: 2px solid rgba(255,226,52,0.3);
    border-radius: 16px; padding: 1.2rem 2.5rem;
    font-family: 'Boogaloo', cursive; font-size: 1.4rem;
    color: var(--yellow); cursor: pointer;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .potw-btn:hover { background: rgba(255,226,52,0.15); border-color: var(--yellow); transform: translateY(-2px); }
  .potw-btn .btn-pct { display: block; font-size: 0.9rem; margin-top: 0.3rem; opacity: 0; transition: opacity 0.3s; }
  .potw-btn.revealed .btn-pct { opacity: 1; }
  .potw-btn.winner { background: rgba(27,221,122,0.15); border-color: var(--green); color: var(--green); }

  .potw-placeholder-text { color: rgba(255,226,52,0.3); font-size: 1.1rem; }

  .vs { font-family: 'Boogaloo', cursive; font-size: 2rem; color: var(--pink); }

  /* MAIN */
  main { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 1rem 2rem 4rem; }

  .section { margin-bottom: 4rem; animation: fadeUp 0.5s ease both; }
  .section:nth-child(1) { animation-delay: 0.1s; }
  .section:nth-child(2) { animation-delay: 0.2s; }
  .section:nth-child(3) { animation-delay: 0.3s; }
  .section:nth-child(4) { animation-delay: 0.4s; }
  .section:nth-child(5) { animation-delay: 0.5s; }
  .section:nth-child(6) { animation-delay: 0.6s; }

  .section-header {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1.5rem; padding-bottom: 0.75rem;
    border-bottom: 2px solid rgba(255,255,255,0.07);
  }
  .section-icon { font-size: 2rem; }
  .section-title { font-family: 'Boogaloo', cursive; font-size: 2rem; }
  .section-count { margin-left: auto; font-size: 0.75rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

  .polls-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }

  .poll-card {
    background: var(--card); border-radius: 20px; padding: 1.5rem;
    border: 1.5px solid rgba(255,255,255,0.06);
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .poll-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent, var(--yellow)); border-radius: 20px 20px 0 0;
  }
  .poll-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.12); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }

  .poll-question { font-size: 0.85rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1.2rem; }

  .poll-options { display: flex; flex-direction: column; gap: 0.75rem; }

  .poll-btn {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 0.85rem 1.2rem;
    color: var(--text); font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 1rem; cursor: pointer;
    transition: all 0.18s; text-align: left;
    display: flex; align-items: center; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .poll-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: var(--accent, var(--yellow)); color: var(--accent, var(--yellow)); transform: translateX(4px); }
  .poll-btn:disabled { cursor: default; }
  .poll-btn.winner { background: rgba(27,221,122,0.15); border-color: var(--green); color: var(--green); }
  .poll-btn.voted { background: rgba(43,170,255,0.15); border-color: var(--blue); color: var(--blue); }

  .btn-label { flex: 1; }
  .btn-pct { font-size: 0.85rem; font-weight: 900; min-width: 40px; text-align: right; }

  .poll-bar {
    position: absolute; left: 0; top: 0; bottom: 0;
    border-radius: 10px; opacity: 0;
    transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    pointer-events: none;
  }
  .poll-btn:first-of-type .poll-bar { background: rgba(43,170,255,0.12); }
  .poll-btn:last-of-type .poll-bar { background: rgba(255,107,43,0.12); }
  .poll-card.revealed .poll-bar { opacity: 1; }

  .vs-divider { text-align: center; font-family: 'Boogaloo', cursive; font-size: 1rem; color: var(--pink); letter-spacing: 2px; }

  /* section colors */
  .sports .poll-card { --accent: #1BDD7A; } .sports .section-title { color: #1BDD7A; }
  .general .poll-card { --accent: #FF6B2B; } .general .section-title { color: #FF6B2B; }
  .movies .poll-card { --accent: #2BAAFF; } .movies .section-title { color: #2BAAFF; }
  .music .poll-card { --accent: #FF3D8A; } .music .section-title { color: #FF3D8A; }
  .gaming .poll-card { --accent: #A855F7; } .gaming .section-title { color: #A855F7; }
  .tech .poll-card { --accent: #FFE234; } .tech .section-title { color: #FFE234; }

  /* FOOTER */
  footer { position: relative; z-index: 1; text-align: center; padding: 3rem 2rem; border-top: 2px solid rgba(255,255,255,0.07); }
  .what-it-took-btn {
    display: inline-block;
    background: linear-gradient(135deg, var(--pink), var(--orange));
    color: white; font-family: 'Boogaloo', cursive;
    font-size: 1.3rem; letter-spacing: 1px;
    padding: 1rem 2.5rem; border-radius: 50px;
    text-decoration: none; border: none; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(255,61,138,0.3);
  }
  .what-it-took-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 8px 30px rgba(255,61,138,0.5); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card); border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 50px; padding: 0.75rem 1.5rem;
    font-weight: 700; font-size: 0.9rem; z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* LOADING */
  .loading { text-align: center; color: var(--muted); padding: 2rem; font-size: 1.1rem; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .potw { animation: fadeUp 0.6s ease both; }

  @media (max-width: 600px) {
    nav { padding: 0 1rem; }
    .nav-links { display: none; }
    .potw { margin: 1.5rem 1rem; padding: 2rem 1.5rem; }
    main { padding: 1rem 1rem 3rem; }
    .potw h2 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">Poll<span>Zone</span> 🔥</a>
  <ul class="nav-links">
    <a href="#sports">⚽ Sports</a>
    <a href="#general">🎉 General</a>
    <a href="#movies">🎬 Movies</a>
    <a href="#music">🎵 Music</a>
    <a href="#gaming">🎮 Gaming</a>
    <a href="#tech">📱 Tech</a>
    <a href="#potw">🏆 POTW</a>
  </ul>
</nav>

<!-- POLL OF THE WEEK -->
<div class="potw" id="potw">
  <div class="potw-badge">⭐ Poll of the Week</div>
  <div id="potw-content">
    <div class="loading">Loading...</div>
  </div>
</div>

<main id="main-content">
  <div class="loading">Loading polls...</div>
</main>

<footer>
  <a class="what-it-took-btn" href="what-it-took.html">✨ What It Took</a>
</footer>

<div class="toast" id="toast">✅ Vote recorded!</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  // Change this to your Render backend URL once deployed
  const API_BASE = window.location.origin;

  // Track what this user has voted on (session only)
  const voted = {};

  // ── Fetch & Render ────────────────────────────────────────────────────────
  async function init() {
    await Promise.all([loadPOTW(), loadPolls()]);
  }

  // Poll of the Week
  async function loadPOTW() {
    const el = document.getElementById('potw-content');
    try {
      const res = await fetch(`${API_BASE}/api/potw`);
      const potw = await res.json();

      if (!potw) {
        el.innerHTML = `
          <h2>Coming Soon...</h2>
          <p>A new poll drops every week. Check back soon!</p>
          <p class="potw-placeholder-text">⭐ Poll of the Week will appear here</p>`;
        return;
      }

      const total = (potw.votes_a + potw.votes_b) || 1;
      const pctA = Math.round((potw.votes_a / total) * 100);
      const pctB = 100 - pctA;
      const hasVoted = voted['potw'];

      el.innerHTML = `
        <h2>${potw.question}</h2>
        <p>${potw.votes_a + potw.votes_b} votes so far</p>
        <div class="potw-options">
          <button class="potw-btn ${hasVoted ? 'revealed' : ''} ${hasVoted && pctA >= pctB ? 'winner' : ''}"
            onclick="votePoTW('a')" ${hasVoted ? 'disabled' : ''} id="potw-a">
            ${potw.option_a}
            <span class="btn-pct">${hasVoted ? pctA + '%' : ''}</span>
          </button>
          <div class="vs">VS</div>
          <button class="potw-btn ${hasVoted ? 'revealed' : ''} ${hasVoted && pctB > pctA ? 'winner' : ''}"
            onclick="votePoTW('b')" ${hasVoted ? 'disabled' : ''} id="potw-b">
            ${potw.option_b}
            <span class="btn-pct">${hasVoted ? pctB + '%' : ''}</span>
          </button>
        </div>`;
    } catch (e) {
      el.innerHTML = `<p style="color:var(--muted)">Could not load poll of the week.</p>`;
    }
  }

  async function votePoTW(option) {
    if (voted['potw']) return;
    voted['potw'] = option;
    try {
      const res = await fetch(`${API_BASE}/api/potw/vote`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ option })
      });
      await res.json();
      showToast();
      loadPOTW();
    } catch (e) { console.error(e); }
  }

  // All polls
  async function loadPolls() {
    const main = document.getElementById('main-content');
    try {
      const res = await fetch(`${API_BASE}/api/polls`);
      const polls = await res.json();

      const sections = [
        { id: 'sports', label: 'Sports', icon: '⚽' },
        { id: 'general', label: 'General', icon: '🎉' },
        { id: 'movies', label: 'Movies & TV', icon: '🎬' },
        { id: 'music', label: 'Music', icon: '🎵' },
        { id: 'gaming', label: 'Gaming', icon: '🎮' },
        { id: 'tech', label: 'Tech', icon: '📱' },
      ];

      main.innerHTML = sections.map(sec => {
        const secPolls = polls.filter(p => p.section === sec.id);
        return `
          <section class="section ${sec.id}" id="${sec.id}">
            <div class="section-header">
              <span class="section-icon">${sec.icon}</span>
              <h2 class="section-title">${sec.label}</h2>
              <span class="section-count">${secPolls.length} polls</span>
            </div>
            <div class="polls-grid">
              ${secPolls.map(poll => renderPollCard(poll)).join('')}
            </div>
          </section>`;
      }).join('');

    } catch (e) {
      main.innerHTML = `<p style="color:var(--muted);text-align:center;padding:2rem;">Could not load polls. Is the server running?</p>`;
    }
  }

  function renderPollCard(poll) {
    const total = (poll.votes_a + poll.votes_b) || 1;
    const pctA = Math.round((poll.votes_a / total) * 100);
    const pctB = 100 - pctA;
    const hasVoted = voted[poll.id];
    const revealed = hasVoted ? 'revealed' : '';

    return `
      <div class="poll-card ${revealed}" id="card-${poll.id}">
        <div class="poll-question">${poll.question}</div>
        <div class="poll-options">
          <button class="poll-btn ${hasVoted && poll.votes_a >= poll.votes_b ? 'winner' : ''} ${hasVoted === 'a' ? 'voted' : ''}"
            onclick="castVote('${poll.id}', 'a')" ${hasVoted ? 'disabled' : ''}>
            <div class="poll-bar" style="width:${hasVoted ? pctA : 0}%"></div>
            <span class="btn-label">${poll.option_a}</span>
            <span class="btn-pct">${hasVoted ? pctA + '%' : ''}</span>
          </button>
          <div class="vs-divider">VS</div>
          <button class="poll-btn ${hasVoted && poll.votes_b > poll.votes_a ? 'winner' : ''} ${hasVoted === 'b' ? 'voted' : ''}"
            onclick="castVote('${poll.id}', 'b')" ${hasVoted ? 'disabled' : ''}>
            <div class="poll-bar" style="width:${hasVoted ? pctB : 0}%"></div>
            <span class="btn-label">${poll.option_b}</span>
            <span class="btn-pct">${hasVoted ? pctB + '%' : ''}</span>
          </button>
        </div>
      </div>`;
  }

  async function castVote(pollId, option) {
    if (voted[pollId]) return;
    voted[pollId] = option;

    try {
      const res = await fetch(`${API_BASE}/api/vote`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pollId, option })
      });
      const updated = await res.json();

      // Update just this card
      const card = document.getElementById(`card-${pollId}`);
      if (card) {
        card.outerHTML = renderPollCard(updated);
        // Trigger bar animation
        setTimeout(() => {
          const newCard = document.getElementById(`card-${pollId}`);
          if (newCard) newCard.classList.add('revealed');
        }, 50);
      }

      showToast();
    } catch (e) { console.error(e); }
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // Smooth scroll
  document.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      document.querySelector(a.getAttribute('href'))?.scrollIntoView({ behavior: 'smooth' });
    });
  });

  init();
</script>
</body>
</html>
