<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PollZone Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFE234;
    --orange: #FF6B2B;
    --pink: #FF3D8A;
    --green: #1BDD7A;
    --dark: #0F0F1A;
    --card: #1A1A2E;
    --text: #F0F0FF;
    --muted: #8888AA;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .container {
    background: var(--card);
    border: 2px solid rgba(255,226,52,0.3);
    border-radius: 24px;
    padding: 2.5rem;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 0 60px rgba(255,226,52,0.1);
  }

  h1 {
    font-family: 'Boogaloo', cursive;
    font-size: 2rem;
    color: var(--yellow);
    margin-bottom: 0.3rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }

  .form-group {
    margin-bottom: 1.2rem;
  }

  label {
    display: block;
    font-weight: 800;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus { border-color: var(--yellow); }
  input::placeholder { color: var(--muted); font-weight: 400; }

  .divider {
    text-align: center;
    font-family: 'Boogaloo', cursive;
    color: var(--pink);
    font-size: 1.2rem;
    margin: 0.5rem 0;
  }

  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    border: none;
    border-radius: 12px;
    padding: 1rem;
    color: var(--dark);
    font-family: 'Boogaloo', cursive;
    font-size: 1.3rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 1rem;
  }

  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,226,52,0.3); }
  .submit-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

  .message {
    margin-top: 1rem;
    padding: 0.85rem 1rem;
    border-radius: 12px;
    font-weight: 700;
    text-align: center;
    display: none;
  }

  .message.success { background: rgba(27,221,122,0.15); border: 1.5px solid var(--green); color: var(--green); display: block; }
  .message.error { background: rgba(255,61,138,0.15); border: 1.5px solid var(--pink); color: var(--pink); display: block; }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 1.5rem;
    color: var(--muted);
    text-decoration: none;
    font-weight: 700;
    font-size: 0.9rem;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--yellow); }

  .lock-screen {
    text-align: center;
  }
  .lock-screen h1 { margin-bottom: 0.3rem; }
  .lock-screen .subtitle { margin-bottom: 1.5rem; }
  .lock-screen input { margin-bottom: 1rem; }

  .admin-panel { display: none; }
</style>
</head>
<body>

<div class="container">

  <!-- Lock screen -->
  <div class="lock-screen" id="lock-screen">
    <h1>🔧 Admin Panel</h1>
    <p class="subtitle">Enter your admin key to continue</p>
    <input type="password" id="key-input" placeholder="Admin key..." />
    <button class="submit-btn" onclick="unlock()">Unlock 🔓</button>
    <div class="message" id="lock-message"></div>
  </div>

  <!-- Admin panel -->
  <div class="admin-panel" id="admin-panel">
    <h1>🏆 Poll of the Week</h1>
    <p class="subtitle">Update this week's featured poll</p>

    <div class="form-group">
      <label>Question</label>
      <input type="text" id="question" placeholder="e.g. Best superhero?" />
    </div>

    <div class="form-group">
      <label>Option A</label>
      <input type="text" id="option_a" placeholder="e.g. 🦸 Spider-Man" />
    </div>

    <div class="divider">VS</div>

    <div class="form-group">
      <label>Option B</label>
      <input type="text" id="option_b" placeholder="e.g. 🦇 Batman" />
    </div>

    <button class="submit-btn" id="submit-btn" onclick="updatePOTW()">Update Poll of the Week 🚀</button>
    <div class="message" id="message"></div>

    <a class="back-link" href="index.html">← Back to PollZone</a>
  </div>

</div>

<script>
  const API_BASE = window.location.origin;
  let adminKey = '';

  function unlock() {
    const input = document.getElementById('key-input').value.trim();
    if (!input) return;
    adminKey = input;

    // Try to verify by fetching POTW
    fetch(`${API_BASE}/api/potw`)
      .then(res => res.json())
      .then(data => {
        // Fill in current poll if exists
        if (data) {
          document.getElementById('question').value = data.question || '';
          document.getElementById('option_a').value = data.option_a || '';
          document.getElementById('option_b').value = data.option_b || '';
        }
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'block';
      })
      .catch(() => {
        const msg = document.getElementById('lock-message');
        msg.textContent = '❌ Could not connect to server';
        msg.className = 'message error';
      });
  }

  async function updatePOTW() {
    const question = document.getElementById('question').value.trim();
    const option_a = document.getElementById('option_a').value.trim();
    const option_b = document.getElementById('option_b').value.trim();
    const msg = document.getElementById('message');
    const btn = document.getElementById('submit-btn');

    if (!question || !option_a || !option_b) {
      msg.textContent = '❌ Fill in all three fields!';
      msg.className = 'message error';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating...';
    msg.className = 'message';

    try {
      const res = await fetch(`${API_BASE}/api/potw`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, option_a, option_b, adminKey })
      });

      if (res.status === 401) {
        msg.textContent = '❌ Wrong admin key!';
        msg.className = 'message error';
        return;
      }

      if (!res.ok) throw new Error();

      msg.textContent = '✅ Poll of the Week updated!';
      msg.className = 'message success';
    } catch {
      msg.textContent = '❌ Something went wrong, try again';
      msg.className = 'message error';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Update Poll of the Week 🚀';
    }
  }

  // Allow pressing Enter to unlock
  document.getElementById('key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') unlock();
  });
</script>
</body>
</html>
